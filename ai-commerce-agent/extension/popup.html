<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      body{min-width:280px;font-family:system-ui;padding:12px}
      button{padding:8px 12px;border-radius:10px;border:1px solid #ddd;cursor:pointer}
      input,select{padding:6px 8px;border-radius:8px;border:1px solid #ddd;margin-top:6px;width:100%}
    </style>
  </head>
  <body>
    <h3 style="margin-top:0">AI Commerce Agent</h3>
    <button id="trigger">今のタブで「ページ解析」を押す</button>
    <div style="margin-top:8px;">
      <label>キーワード</label>
      <input id="kw" placeholder="例: ノートPC" />
      <label>プロバイダ</label>
      <select id="provider"><option value="jd">JD</option><option value="meituan">Meituan</option></select>
      <button id="doSearch" style="margin-top:8px; width:100%">このタブで「検索TOP3」を押す</button>
    </div>
    <p style="font-size:12px;color:#555">※ 結果はページ右下のパネルに出ます</p>
    <script src="popup.js"></script>
  </body>
</html>
