<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Commerce Agent</title>
    <style>
        :root {
            --bg: #0b1220;
            --card: rgba(255, 255, 255, .04);
            --border: rgba(255, 255, 255, .07);
            --text: #e5e7eb;
            --muted: rgba(229, 231, 235, .75);
            --accent: #10b981;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, Segoe UI, Roboto;
        }

        .wrap {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, .02);
        }

        header .title {
            font-weight: 700;
            font-size: 13px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        header .badge {
            width: 20px;
            height: 20px;
            border-radius: 999px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #062b1f;
            font-weight: 800;
            font-size: 11px;
        }

        main {
            flex: 1;
            min-height: 0;
            overflow: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .bubble {
            max-width: 92%;
            padding: 8px 10px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--card);
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 13px;
        }

        .me {
            align-self: flex-end;
            background: rgba(16, 185, 129, .14);
            border-color: rgba(16, 185, 129, .35);
        }

        .bot {
            align-self: flex-start;
        }

        .row {
            display: flex;
            gap: 8px;
            padding: 10px;
            border-top: 1px solid var(--border);
            background: rgba(255, 255, 255, .01);
        }

        textarea {
            flex: 1;
            resize: none;
            height: 38px;
            max-height: 90px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .02);
            color: var(--text);
            padding: 8px 10px;
            font-size: 13px;
            outline: none;
        }

        button {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .02);
            color: var(--text);
            cursor: pointer;
            font-size: 16px;
        }

        button.primary {
            background: var(--accent);
            border-color: rgba(16, 185, 129, .7);
            color: #062b1f;
            font-weight: 800;
        }

        button.recording {
            background: rgba(239, 68, 68, .15);
            border-color: rgba(239, 68, 68, .5);
        }

        .products {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card {
            display: flex;
            gap: 10px;
            align-items: center;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .02);
            padding: 8px;
            border-radius: 12px;
        }

        .thumb {
            width: 56px;
            height: 56px;
            border-radius: 10px;
            background: rgba(255, 255, 255, .04);
            overflow: hidden;
            flex: 0 0 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: var(--muted);
        }

        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .meta {
            flex: 1;
            min-width: 0;
        }

        .meta .t {
            font-weight: 700;
            font-size: 13px;
            line-height: 1.25;
        }

        .meta .d {
            font-size: 12px;
            color: var(--muted);
            margin-top: 3px;
        }

        .meta .p {
            font-size: 12px;
            color: rgba(229, 231, 235, .85);
            margin-top: 3px;
        }

        .open {
            font-size: 12px;
            padding: 6px 8px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .03);
            white-space: nowrap;
        }

        .hint {
            color: var(--muted);
            font-size: 12px;
        }

        header .actions{
            display:flex;
            gap:8px;
            align-items:center;
        }

        header button.tool{
            width:auto;
            height:28px;
            padding:0 10px;
            font-size:12px;
            border-radius:10px;
            border:1px solid var(--border);
            background: rgba(255,255,255,.02);
        }

    </style>
</head>

<body>
    <div class="wrap">
        <header>
