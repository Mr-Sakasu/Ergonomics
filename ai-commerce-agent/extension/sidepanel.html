<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Commerce Agent</title>
    <style>
        :root {
            --bg0: #0b1020;
            --bg1: #0f172a;
            --card: rgba(255, 255, 255, 0.06);
            --card2: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --text: rgba(255, 255, 255, 0.92);
            --muted: rgba(255, 255, 255, 0.65);
            --muted2: rgba(255, 255, 255, 0.45);
            --green: #10b981;
            --cyan: #22d3ee;
            --danger: #fb7185;
            --shadow: 0 10px 25px rgba(0, 0, 0, .35);
            --radius: 14px;
            --radius2: 10px;
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background: radial-gradient(1200px 500px at 30% -10%, rgba(34, 211, 238, .18), transparent 60%),
                radial-gradient(1000px 500px at 110% 0%, rgba(16, 185, 129, .18), transparent 55%),
                linear-gradient(180deg, var(--bg0), var(--bg1));
        }

        .app {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 12px 10px 12px;
            border-bottom: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(6px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .logo {
            width: 28px;
            height: 28px;
            border-radius: 999px;
            background: rgba(16, 185, 129, .18);
            border: 1px solid rgba(16, 185, 129, .35);
            display: grid;
            place-items: center;
            box-shadow: 0 8px 20px rgba(16, 185, 129, .12);
            font-weight: 700;
            letter-spacing: .3px;
        }

        .brandText {
            min-width: 0;
        }

        .brandTitle {
            font-size: 13px;
            font-weight: 700;
            line-height: 1.1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .brandSub {
            margin-top: 3px;
            font-size: 11px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: rgba(255, 255, 255, .25);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, .06);
            flex: 0 0 auto;
        }

        .dot.on {
            background: var(--green);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, .16);
        }

        .actions {
            display: flex;
            gap: 8px;
            flex: 0 0 auto;
        }

        .btn {
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .04);
            color: var(--text);
            border-radius: 10px;
            height: 34px;
            padding: 0 10px;
            font-size: 12px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform .06s ease, background .12s ease, border-color .12s ease;
            user-select: none;
        }

        .btn:hover {
            background: rgba(255, 255, 255, .06);
            border-color: rgba(255, 255, 255, .12);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn .k {
            font-family: var(--mono);
            font-size: 11px;
            opacity: .7;
        }

        .btn.primary {
            background: rgba(16, 185, 129, .16);
            border-color: rgba(16, 185, 129, .35);
        }

        .btn.danger {
            background: rgba(251, 113, 133, .12);
            border-color: rgba(251, 113, 133, .35);
        }

        .chips {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 10px 12px 0 12px;
            flex-wrap: wrap;
        }

        .chip {
            font-size: 11px;
            color: var(--muted);
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .03);
            padding: 5px 8px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .chip strong {
            color: var(--text);
            font-weight: 700;
        }

        .chip.on {
            border-color: rgba(16, 185, 129, .35);
            background: rgba(16, 185, 129, .10);
            color: rgba(255, 255, 255, .82);
        }

        .messages {
            flex: 1;
            min-height: 0;
            overflow: auto;
            padding: 10px 12px 14px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overscroll-behavior: contain;
        }

        .bubble {
            max-width: 92%;
            padding: 9px 11px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.35;
            word-break: break-word;
            border: 1px solid rgba(255, 255, 255, .06);
        }

        .bubble.me {
            align-self: flex-end;
            background: rgba(16, 185, 129, .88);
            border-color: rgba(16, 185, 129, .35);
            color: #071216;
            border-radius: 14px 14px 4px 14px;
        }

        .bubble.ai {
            align-self: flex-start;
            background: rgba(255, 255, 255, .05);
            border-color: rgba(255, 255, 255, .08);
            border-radius: 14px 14px 14px 4px;
        }

        .bubble.meta {
            align-self: center;
            font-size: 11px;
            color: var(--muted);
            background: rgba(255, 255, 255, .03);
            border: 1px dashed rgba(255, 255, 255, .10);
            max-width: 100%;
        }

        .products {
            align-self: stretch;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 2px;
        }

        .pCard {
            display: flex;
            gap: 10px;
            padding: 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, .03);
            border: 1px solid rgba(255, 255, 255, .08);
        }

        .thumb {
            width: 64px;
            height: 64px;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(15, 23, 42, .35);
            border: 1px solid rgba(255, 255, 255, .06);
            flex: 0 0 auto;
            display: grid;
            place-items: center;
            color: var(--muted2);
            font-size: 11px;
        }

        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .pInfo {
            flex: 1;
            min-width: 0;
        }

        .pTitle {
            font-weight: 700;
            font-size: 13px;
            line-height: 1.25;
            margin: 0;
            color: var(--text);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .pDesc {
            margin-top: 4px;
            font-size: 12px;
            color: var(--muted);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .pMeta {
            margin-top: 6px;
            font-size: 12px;
            color: rgba(255, 255, 255, .82);
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .pMeta .src {
            color: var(--muted);
        }

        .pActions a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            text-decoration: none;
            color: var(--cyan);
            font-size: 12px;
        }

        .pActions a:hover {
            text-decoration: underline;
        }

        .composer {
            border-top: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(6px);
            padding: 10px 12px 12px 12px;
        }

        .row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            min-height: 42px;
            max-height: 140px;
            resize: none;
            padding: 10px 10px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .08);
            background: rgba(255, 255, 255, .03);
            color: var(--text);
            outline: none;
            font-size: 13px;
            line-height: 1.35;
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, .45);
        }

        .iconBtn {
            width: 44px;
            height: 42px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .10);
            background: rgba(255, 255, 255, .04);
            color: var(--text);
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: transform .06s ease, background .12s ease, border-color .12s ease;
            user-select: none;
        }

        .iconBtn:hover {
            background: rgba(255, 255, 255, .06);
            border-color: rgba(255, 255, 255, .14);
        }

        .iconBtn:active {
            transform: translateY(1px);
        }

        .iconBtn.primary {
            background: rgba(16, 185, 129, .16);
            border-color: rgba(16, 185, 129, .35);
        }

        .iconBtn.recording {
            background: rgba(251, 113, 133, .14);
            border-color: rgba(251, 113, 133, .35);
        }

        .hint {
            margin-top: 8px;
            font-size: 11px;
            color: var(--muted2);
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }

        .hint code {
            font-family: var(--mono);
            color: rgba(255, 255, 255, .78);
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .08);
            padding: 2px 6px;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="topbar">
            <div class="brand">
                <div class="logo">AI</div>
                <div class="brandText">
                    <div class="brandTitle">AI Commerce Agent</div>
                    <div class="brandSub">
                        <span id="connDot" class="dot"></span>
                        <span id="pageLine">Active page: (loading…)</span>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button id="btnUsePage" class="btn primary" title="このページをコンテキストにする">
                    🧩 <span>Context</span>
                </button>
                <button id="btnClear" class="btn danger" title="チャットをクリア">
                    🗑 <span>Clear</span>
                </button>
            </div>
        </div>

        <div class="chips">
            <div id="chipSite" class="chip">Site: <strong id="siteHost">-</strong></div>
            <div id="chipMode" class="chip">Mode: <strong id="modeText">Auto</strong></div>
            <div id="chipCtx" class="chip">Context: <strong id="ctxText">OFF</strong></div>
        </div>

        <div id="messages" class="messages"></div>

        <div class="composer">
            <div class="row">
                <textarea id="input" placeholder="商品や条件を入力…（例：『京東で 2000元以内のスマホ』）"></textarea>
                <button id="btnMic" class="iconBtn" title="音声で話す">🎤</button>
                <button id="btnSend" class="iconBtn primary" title="送信">➤</button>
            </div>
            <div class="hint">
                <div>Enterで送信 / Shift+Enterで改行</div>
                <div><code>Context</code> は必要なときだけ押すのが安全</div>
            </div>
        </div>
    </div>

    <script src="sidepanel.js"></script>
</body>

</html>
